# File 3: schedule.yml (Updated version)
# This updated version uses Node 22 and removes caching to support browser-only repos.

name: World Cup 2026 AI Predictor

on:
  schedule:
    # Runs automatically every 30 minutes, 24/7.
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # This enables a "Run workflow" button in the GitHub Actions tab.

jobs:
  run-predictor:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Copy the files from your repository into the runner
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js environment (Upgraded to Node 22)
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # We have removed the "cache: npm" line. This allows the script to run
          # perfectly without needing a package-lock.json file.

      # Step 3: Install dependencies specified in package.json
      - name: Install Project Dependencies
        run: npm install

      # Step 4: Run the script using your securely stored secrets
      - name: Execute Prediction Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node predict.js
