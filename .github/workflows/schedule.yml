# File 3: schedule.yml
# This file configures GitHub Actions to run your predict.js file automatically.

name: World Cup 2026 AI Predictor

on:
  schedule:
    # Runs automatically every 30 minutes, 24/7.
    # This frequent check ensures we catch matches in their T-2 hour window.
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # This enables a "Run workflow" button in the GitHub Actions tab.
    # You can click it anytime to run predictions manually for testing.

jobs:
  run-predictor:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Copy the files from your repository into the runner
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js environment
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Step 3: Install dependencies specified in package.json
      - name: Install Project Dependencies
        run: npm install

      # Step 4: Run the script using your securely stored secrets
      - name: Execute Prediction Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node predict.js
