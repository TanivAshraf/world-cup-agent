# File 3: schedule.yml (Auto-Commit CSV Version)
# This script runs predictions and automatically commits the raw research data back to your repo.

name: World Cup 2026 AI Predictor

on:
  schedule:
    # Runs automatically every 30 minutes, 24/7.
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # This enables a "Run workflow" button in the GitHub Actions tab.

jobs:
  run-predictor:
    runs-on: ubuntu-latest
    
    # We grant explicit write permissions so the runner can push CSV updates back to your repo
    permissions:
      contents: write

    steps:
      # Step 1: Copy the files from your repository into the runner
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js environment
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Step 3: Install dependencies specified in package.json
      - name: Install Project Dependencies
        run: npm install

      # Step 4: Run the main prediction and autonomous syncing script
      - name: Execute Prediction and Syncing Pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node predict.js

      # Step 5: Execute the CSV exporter script (We will create this file next)
      - name: Generate Public CSV Research Archive
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node export.js

      # Step 6: Automatically commit and push the updated CSV file back to your repository
      - name: Commit and Push CSV Archive Updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add wc_predictions_archive.csv
          git commit -m "Auto-update predictions archive CSV [skip ci]" || exit 0
          git push
